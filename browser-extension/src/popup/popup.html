<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>True Protection by Jag</title>
  <link rel="stylesheet" href="popup.css">
</head>
<body>
  <div class="popup-container">

    <!-- Header -->
    <header class="popup-header">
      <div class="header-brand">
        <img src="../../icons/icon-32.png" alt="True Protection" class="header-icon">
        <div class="header-text">
          <h1>True Protection</h1>
          <span class="header-subtitle">by Jag</span>
        </div>
      </div>
      <div class="header-status" id="daemon-status" title="Daemon connection status">
        <span class="status-dot" id="daemon-dot"></span>
      </div>
    </header>

    <!-- Account Bar -->
    <section class="account-section" id="account-section">
      <!-- Logged out state -->
      <div class="account-logged-out" id="account-logged-out">
        <form class="login-form" id="login-form">
          <input type="email" id="login-email" class="input-sm" placeholder="Email" required autocomplete="email">
          <input type="password" id="login-password" class="input-sm" placeholder="Password" required autocomplete="current-password">
          <button type="submit" class="btn-sm btn-primary-sm" id="btn-login">Log In</button>
        </form>
        <span class="login-error hidden" id="login-error"></span>
      </div>
      <!-- Logged in state -->
      <div class="account-logged-in hidden" id="account-logged-in">
        <div class="account-info">
          <span class="account-email" id="account-email"></span>
          <span class="account-tier" id="account-tier">Free</span>
        </div>
        <button class="btn-sm btn-outline-sm" id="btn-logout">Log Out</button>
      </div>
    </section>

    <!-- Current Page Status -->
    <section class="page-status" id="page-status-section">
      <div class="status-banner" id="status-banner">
        <div class="status-icon" id="status-icon">
          <svg id="icon-safe" class="status-svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M12 2l3.09 6.26L22 9.27l-5 4.87 1.18 6.88L12 17.77l-6.18 3.25L7 14.14 2 9.27l6.91-1.01L12 2z"/>
          </svg>
          <svg id="icon-warning" class="status-svg hidden" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M10.29 3.86L1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0z"/>
            <line x1="12" y1="9" x2="12" y2="13"/>
            <line x1="12" y1="17" x2="12.01" y2="17"/>
          </svg>
          <svg id="icon-blocked" class="status-svg hidden" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <circle cx="12" cy="12" r="10"/>
            <line x1="4.93" y1="4.93" x2="19.07" y2="19.07"/>
          </svg>
          <svg id="icon-disabled" class="status-svg hidden" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <circle cx="12" cy="12" r="10"/>
            <line x1="8" y1="12" x2="16" y2="12"/>
          </svg>
        </div>
        <div class="status-text">
          <span class="status-label" id="status-label">Checking...</span>
          <span class="status-detail" id="status-detail"></span>
        </div>
      </div>

      <!-- Threat Details (shown when threats detected) -->
      <div class="threat-details hidden" id="threat-details">
        <ul class="threat-list" id="threat-list"></ul>
      </div>
    </section>

    <!-- Stats -->
    <section class="stats-section">
      <div class="stat-item">
        <span class="stat-value" id="stat-scanned">0</span>
        <span class="stat-label">Pages Scanned</span>
      </div>
      <div class="stat-divider"></div>
      <div class="stat-item">
        <span class="stat-value" id="stat-blocked">0</span>
        <span class="stat-label">Threats Blocked</span>
      </div>
      <div class="stat-divider"></div>
      <div class="stat-item">
        <span class="stat-value" id="stat-phishing">0</span>
        <span class="stat-label">Phishing</span>
      </div>
    </section>

    <!-- Protection Toggle -->
    <section class="toggle-section">
      <div class="toggle-row">
        <span class="toggle-label">Protection</span>
        <label class="toggle-switch">
          <input type="checkbox" id="protection-toggle" checked>
          <span class="toggle-slider"></span>
        </label>
      </div>
      <div class="protection-level" id="protection-level-display">
        <span class="level-badge" id="level-badge">Balanced</span>
      </div>
    </section>

    <!-- JagAI Pro Badge (shown only for Pro users) -->
    <section class="pro-section hidden" id="pro-section">
      <div class="pro-badge">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="14" height="14">
          <path d="M18 10h-1.26A8 8 0 1 0 9 20h9a5 5 0 0 0 0-10z"/>
        </svg>
        JagAI Cloud Active
      </div>
    </section>

    <!-- Actions -->
    <section class="actions-section">
      <button class="action-btn" id="btn-report" title="Report false positive">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="16" height="16">
          <path d="M4 15s1-1 4-1 5 2 8 2 4-1 4-1V3s-1 1-4 1-5-2-8-2-4 1-4 1z"/>
          <line x1="4" y1="22" x2="4" y2="15"/>
        </svg>
        Report False Positive
      </button>
      <button class="action-btn action-btn-primary" id="btn-dashboard" title="Open True Protection dashboard">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="16" height="16">
          <rect x="3" y="3" width="18" height="18" rx="2" ry="2"/>
          <line x1="3" y1="9" x2="21" y2="9"/>
          <line x1="9" y1="21" x2="9" y2="9"/>
        </svg>
        Dashboard
      </button>
    </section>

    <!-- Footer -->
    <footer class="popup-footer">
      <span class="footer-text">Powered by JagAI</span>
      <a href="#" id="btn-options" class="footer-link">Settings</a>
    </footer>

  </div>

  <script src="popup.js"></script>
</body>
</html>
