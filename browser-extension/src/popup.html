<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <link rel="stylesheet" href="popup.css">
</head>
<body>
  <div class="container">
    <div class="header">
      <h1>True Protection</h1>
      <p class="subtitle">by Jag</p>
    </div>
    <div class="stats">
      <div class="stat">
        <span class="stat-value" id="scanned">0</span>
        <span class="stat-label">Sites Scanned</span>
      </div>
      <div class="stat">
        <span class="stat-value" id="blocked">0</span>
        <span class="stat-label">Threats Blocked</span>
      </div>
    </div>
    <div class="status" id="status">
      <span class="dot active"></span> Protection Active
    </div>
    <a href="https://tpjsecurity.com/dashboard" target="_blank" class="btn">Open Dashboard</a>
  </div>
  <script src="popup.js"></script>
